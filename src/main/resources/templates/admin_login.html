<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Login - CyberShield</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 20px;
    padding: 40px 35px;
    width: 340px;
    text-align: center;
    color: white;
  }
  h1 { font-size: 26px; color: #6366f1; margin-bottom: 8px; }
  p { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 25px; }
  .form-group { margin-bottom: 15px; text-align: left; }
  label { font-size: 13px; color: rgba(255,255,255,0.8); display: block; margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white; font-size: 14px; outline: none;
  }
  input:focus { border-color: #6366f1; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 10px;
  }
  .btn:hover { opacity: 0.9; }
  .error {
    background: rgba(255,80,80,0.2);
    border: 1px solid rgba(255,80,80,0.5);
    border-radius: 8px; padding: 10px;
    font-size: 13px; color: #ffaaaa; margin-bottom: 15px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🛡️ CyberShield</h1>
  <p>Admin Login</p>

  <div th:if="${error}" class="error" th:text="${error}"></div>

  <form method="post" action="/admin/login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter admin email" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required autocomplete="off">
    </div>
    <button type="submit" class="btn">Login</button>
  </form>
</div>
</body>
</html>
